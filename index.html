<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatRex | P2P Messenger</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="light-mode">
    <div id="app">
        <!-- Welcome Screen -->
        <section id="welcome-screen" class="screen active">
            <div class="glass-card">
                <div class="logo"><i class="fas fa-shield-halved"></i></div>
                <h1>ChatRex</h1>
                <p>Serverless P2P Chat</p>
                <div class="button-group">
                    <button id="btn-create-room" class="btn-primary">Host a Room</button>
                    <button id="btn-join-room" class="btn-secondary">Join a Room</button>
                </div>
            </div>
        </section>

        <!-- Connection Screen -->
        <section id="connection-screen" class="screen hidden">
            <div class="glass-card">
                <button class="btn-back" onclick="window.location.reload()"><i class="fas fa-arrow-left"></i></button>
                
                <!-- HOST STEP 1 -->
                <div id="host-setup" class="step hidden">
                    <h3>Host: Step 1/2</h3>
                    <p class="small">Ask your friend to scan this QR:</p>
                    <div id="qrcode-host" class="qr-box"></div>
                    <div class="manual-box">
                        <input type="text" id="host-code-out" readonly>
                        <button onclick="copyToClipboard('host-code-out')">Copy</button>
                    </div>
                    <hr>
                    <button id="btn-goto-scan-answer" class="btn-primary">I've shared it, now scan Answer</button>
                </div>

                <!-- GUEST STEP 1 -->
                <div id="guest-scan-step" class="step hidden">
                    <h3>Guest: Scan Host</h3>
                    <div id="reader-host"></div>
                    <div class="manual-entry">
                        <p class="small">Or paste Host's code:</p>
                        <textarea id="guest-paste-host" placeholder="Paste Host Code..."></textarea>
                        <button onclick="guestProcessManual()" class="btn-primary">Process Code</button>
                    </div>
                </div>

                <!-- GUEST STEP 2 -->
                <div id="guest-answer-step" class="step hidden">
                    <h3>Guest: Step 2/2</h3>
                    <p class="small">Show this QR to the Host:</p>
                    <div id="qrcode-guest" class="qr-box"></div>
                    <div class="manual-box">
                        <input type="text" id="guest-code-out" readonly>
                        <button onclick="copyToClipboard('guest-code-out')">Copy</button>
                    </div>
                    <p class="loader">Waiting for Host to connect...</p>
                </div>

                <!-- HOST STEP 2 -->
                <div id="host-scan-answer-step" class="step hidden">
                    <h3>Host: Final Step</h3>
                    <div id="reader-answer"></div>
                    <div class="manual-entry">
                        <p class="small">Or paste Guest's Answer:</p>
                        <textarea id="host-paste-answer" placeholder="Paste Answer Code..."></textarea>
                        <button onclick="hostProcessManual()" class="btn-primary">Finalize Connection</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Chat Screen -->
        <section id="chat-screen" class="screen hidden">
            <nav class="glass-nav">
                <div class="status-info">
                    <div class="dot"></div>
                    <span>Peer Connected</span>
                </div>
                <button onclick="window.location.reload()" class="btn-exit"><i class="fas fa-times"></i></button>
            </nav>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="msg-input" placeholder="Message...">
                <button id="btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
