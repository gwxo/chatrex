<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatRex | P2P Nearby Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="light-mode">
    <div id="app">
        <!-- Welcome Screen -->
        <section id="welcome-screen" class="active">
            <div class="glass-card animated-fade-in">
                <div class="logo"><i class="fas fa-bolt"></i></div>
                <h1>ChatRex</h1>
                <p>Secure, Serverless, Local Chat</p>
                <div class="button-group">
                    <button id="btn-create-room" class="btn-primary">Create Room (Host)</button>
                    <button id="btn-join-room" class="btn-secondary">Join Room (Scan)</button>
                </div>
            </div>
        </section>

        <!-- Connection Workflow -->
        <section id="connection-screen" class="hidden">
            <div class="glass-card">
                <button class="btn-back" onclick="location.reload()"><i class="fas fa-arrow-left"></i></button>
                <h2 id="conn-title">Signaling</h2>
                
                <!-- Host Step 1: Offer -->
                <div id="step-1-offer" class="step hidden">
                    <p class="small">Scan with Google Lens or ChatRex:</p>
                    <div id="qrcode-container"></div>
                    <div class="manual-box">
                        <input type="text" id="manual-code-host" readonly>
                        <button onclick="copyCode('manual-code-host')">Copy</button>
                    </div>
                    <hr>
                    <p class="small">Step 2: Scan your friend's Answer QR</p>
                    <button id="btn-scan-answer" class="btn-primary">Scan Answer QR</button>
                    <button onclick="showManualInput('answer')" class="btn-secondary">Enter Answer Manually</button>
                </div>

                <!-- Guest Step 2: Join/Scan -->
                <div id="step-2-join" class="step hidden">
                    <div id="qr-reader" style="width: 100%;"></div>
                    <div class="manual-entry-area">
                        <p class="small">Or paste Host's Code:</p>
                        <textarea id="manual-paste-host" placeholder="Paste code here..."></textarea>
                        <button onclick="processManualOffer()" class="btn-primary">Connect Manually</button>
                    </div>
                </div>

                <!-- Guest Step 3: Answer -->
                <div id="step-3-answer" class="step hidden">
                    <p class="small">Scan this with the Host's device:</p>
                    <div id="qrcode-answer-container"></div>
                    <div class="manual-box">
                        <input type="text" id="manual-code-guest" readonly>
                        <button onclick="copyCode('manual-code-guest')">Copy</button>
                    </div>
                    <p class="status-msg">Waiting for Host to finalize...</p>
                </div>

                <!-- Host Step 4: Finalize Manual -->
                <div id="manual-answer-input" class="step hidden">
                    <h3>Paste Answer Code</h3>
                    <textarea id="manual-paste-answer" placeholder="Paste guest code here..."></textarea>
                    <button onclick="processManualAnswer()" class="btn-primary">Finalize Connection</button>
                </div>
            </div>
        </section>

        <!-- Chat Dashboard -->
        <section id="chat-screen" class="hidden">
            <nav class="glass-nav">
                <div class="user-info">
                    <div class="status-dot online"></div>
                    <span id="remote-username">Connected Peer</span>
                </div>
                <div class="nav-actions">
                    <button onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
                    <button class="danger" onclick="location.reload()"><i class="fas fa-times"></i></button>
                </div>
            </nav>

            <div id="chat-messages"></div>

            <div class="chat-input-area">
                <input type="text" id="msg-input" placeholder="Type a message...">
                <button id="btn-send" class="btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
